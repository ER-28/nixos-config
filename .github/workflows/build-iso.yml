name: Build NixOS ISO
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v10

      - name: Build ISO
        run: |
          nix build .#nixosConfigurations.nixos-main.buildISO --out-linker=static
          # Note: This assumes the flake is configured to support buildISO

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: nixos-iso
          path: result*.iso
