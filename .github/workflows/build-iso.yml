name: Build NixOS ISO
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        run: |
          curl -L https://nixos.org/nix/install | sh -s -- --daemon
          echo "/nix/var/nix/profiles/default/bin" >> $GITHUB_PATH

      - name: Build ISO
        run: |
          nix build .#nixosIso


          # Note: This assumes the flake is configured to support buildISO

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: nixos-iso
          path: result*.iso
